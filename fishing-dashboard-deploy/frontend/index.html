<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎣 钓鱼数据看板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #1a73e8;
      --primary-dark: #1557b0;
      --accent: #00b894;
      --accent2: #fd7e14;
      --bg: #0f1b2d;
      --bg2: #162032;
      --card: #1e2d42;
      --card2: #243450;
      --border: #2d4263;
      --text: #e8f0fe;
      --text2: #a8b8d0;
      --success: #00c97d;
      --danger: #e74c3c;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI','Microsoft YaHei',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* === AUTH SCREEN === */
    .auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d2137 0%, #1a3a5c 100%);
    }
    .auth-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
    }
    .auth-box .logo { font-size: 3rem; margin-bottom: 12px; }
    .auth-box h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .auth-box .sub { font-size: 0.85rem; color: var(--text2); margin-bottom: 28px; }
    .auth-tabs { display: flex; background: var(--bg2); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
    .auth-tab {
      flex: 1; border: none; background: transparent; color: var(--text2);
      padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s;
    }
    .auth-tab.active { background: var(--primary); color: #fff; }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .auth-form input {
      width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 12px 16px; font-size: 0.95rem; outline: none; margin-bottom: 12px; transition: border-color 0.2s;
    }
    .auth-form input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,115,232,0.2); }
    .auth-form button {
      width: 100%; background: var(--primary); color: #fff; border: none;
      border-radius: 8px; padding: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .auth-form button:hover { background: var(--primary-dark); }
    .auth-form button:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-error { color: var(--danger); font-size: 0.82rem; margin-top: 8px; display: none; text-align: left; padding: 8px 12px; background: rgba(231,76,60,0.1); border-radius: 6px; }
    .auth-hint { font-size: 0.78rem; color: var(--text2); margin-top: 16px; text-align: left; }

    /* === HEADER === */
    .header {
      background: linear-gradient(135deg, #0d2137 0%, #1a3a5c 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
    }
    .header-logo { display: flex; align-items: center; gap: 12px; font-size: 1.2rem; font-weight: 700; }
    .header-logo span { font-size: 1.7rem; }
    .header-nav { display: flex; gap: 4px; }
    .nav-btn {
      background: transparent; border: none; color: var(--text2); padding: 8px 16px;
      border-radius: 8px; cursor: pointer; font-size: 0.88rem; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .nav-btn.active { background: var(--primary); color: #fff; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-badge {
      background: var(--card2); border: 1px solid var(--border); border-radius: 20px;
      padding: 5px 14px; font-size: 0.82rem; color: var(--text2); display: flex; align-items: center; gap: 6px;
    }
    .user-badge .admin-tag { background: var(--accent2); color: #fff; border-radius: 10px; padding: 1px 8px; font-size: 0.72rem; font-weight: 700; }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text2);
      border-radius: 8px; padding: 6px 14px; font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { background: rgba(231,76,60,0.15); border-color: var(--danger); color: var(--danger); }

    /* === LAYOUT === */
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .page { display: none; }
    .page.active { display: block; }

    /* === UTIL === */
    .section-title { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .section-title::before { content: ''; display: block; width: 4px; height: 18px; background: var(--primary); border-radius: 2px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); }
    .card-grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow); transition: transform 0.2s; }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-icon { font-size: 2rem; width: 54px; height: 54px; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: rgba(26,115,232,0.15); flex-shrink: 0; }
    .stat-info .label { font-size: 0.78rem; color: var(--text2); margin-bottom: 4px; }
    .stat-info .value { font-size: 1.5rem; font-weight: 700; }
    .stat-info .sub { font-size: 0.73rem; color: var(--accent); }

    /* === CHART === */
    .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); }
    .chart-card h3 { font-size: 0.92rem; color: var(--text2); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .chart-wrap { position: relative; height: 220px; }

    /* === FORM === */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 0.8rem; color: var(--text2); font-weight: 500; }
    .form-group label span { color: var(--danger); }
    .form-control { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 14px; font-size: 0.88rem; outline: none; transition: border-color 0.2s; width: 100%; }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,115,232,0.2); }
    .form-control option { background: var(--card); }
    textarea.form-control { resize: vertical; min-height: 72px; }
    .form-actions { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }
    .btn { padding: 9px 22px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.88rem; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-success { background: var(--accent); color: #fff; }
    .btn-success:hover { background: #009d73; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
    .btn-ghost:hover { background: var(--card2); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-warning { background: var(--accent2); color: #fff; }
    .btn-warning:hover { background: #e06e10; }
    .btn-sm { padding: 5px 12px; font-size: 0.76rem; }
    .btn-loading { opacity: 0.7; cursor: wait; }

    /* === CATCH ITEM === */
    .catch-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .catch-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .catch-item-header span { font-size: 0.82rem; font-weight: 600; color: var(--text2); }

    /* === TABLE === */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    thead tr { background: var(--card2); }
    th { padding: 9px 14px; text-align: left; font-weight: 600; color: var(--text2); white-space: nowrap; border-bottom: 1px solid var(--border); }
    td { padding: 8px 14px; border-bottom: 1px solid rgba(45,66,99,0.5); white-space: nowrap; }
    tr:hover td { background: rgba(255,255,255,0.03); }

    /* === BADGE === */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.74rem; font-weight: 600; }
    .badge-blue { background: rgba(26,115,232,0.2); color: #7ab3ff; }
    .badge-green { background: rgba(0,185,132,0.2); color: #4ddab3; }
    .badge-orange { background: rgba(253,126,20,0.2); color: #ffaa5c; }
    .badge-red { background: rgba(231,76,60,0.2); color: #ff8b7b; }

    /* === TOAST === */
    #toast { position: fixed; bottom: 30px; right: 30px; background: var(--success); color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 0.88rem; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 9999; display: none; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* === INSIGHT === */
    .insight-box { background: linear-gradient(135deg, rgba(26,115,232,0.15), rgba(0,185,132,0.1)); border: 1px solid rgba(26,115,232,0.3); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
    .insight-box h4 { font-size: 0.88rem; font-weight: 700; color: #7ab3ff; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .insight-list { list-style: none; }
    .insight-list li { font-size: 0.84rem; color: var(--text2); padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; }
    .insight-list li::before { content: '•'; color: var(--accent); font-size: 1rem; flex-shrink: 0; }

    /* === ANALYSIS === */
    .analysis-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .analysis-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); }
    .analysis-card h3 { font-size: 0.92rem; font-weight: 600; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .rank-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(45,66,99,0.4); }
    .rank-item:last-child { border-bottom: none; }
    .rank-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.74rem; font-weight: 700; flex-shrink: 0; }
    .rank-1 { background: #ffd700; color: #000; }
    .rank-2 { background: #c0c0c0; color: #000; }
    .rank-3 { background: #cd7f32; color: #fff; }
    .rank-other { background: var(--card2); color: var(--text2); }
    .rank-info { flex: 1; }
    .rank-info .name { font-size: 0.88rem; font-weight: 600; }
    .rank-info .detail { font-size: 0.74rem; color: var(--text2); margin-top: 2px; }
    .rank-bar-wrap { flex: 1; }
    .rank-bar { height: 7px; border-radius: 4px; background: rgba(255,255,255,0.07); overflow: hidden; }
    .rank-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.6s ease; }
    .rank-val { font-size: 0.84rem; font-weight: 600; color: var(--accent); min-width: 48px; text-align: right; }

    /* === CONDITION MATRIX === */
    .condition-matrix { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .condition-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: all 0.2s; }
    .condition-item:hover { border-color: var(--primary); background: var(--card2); }
    .condition-item .cond-label { font-size: 0.78rem; color: var(--text2); margin-bottom: 6px; }
    .condition-item .cond-value { font-size: 1.15rem; font-weight: 700; }
    .condition-item .cond-sub { font-size: 0.73rem; color: var(--accent); margin-top: 4px; }

    /* === ADMIN === */
    .admin-stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .admin-user-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; display: flex; align-items: center; gap: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .admin-user-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; flex-shrink: 0; }
    .admin-user-info { flex: 1; }
    .admin-user-info .username { font-size: 1rem; font-weight: 600; }
    .admin-user-info .meta { font-size: 0.78rem; color: var(--text2); margin-top: 3px; }
    .admin-user-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .admin-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--bg2); padding: 4px; border-radius: 10px; }
    .admin-tab { padding: 7px 18px; border: none; background: transparent; color: var(--text2); border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
    .admin-tab.active { background: var(--primary); color: #fff; }
    .switch-wrap { display: flex; align-items: center; gap: 10px; }
    .switch { position: relative; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: 0.3s; }
    .slider::before { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: white; top: 3px; left: 3px; transition: 0.3s; }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before { transform: translateX(20px); }

    /* === FILTER === */
    .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .filter-bar select, .filter-bar input { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 12px; font-size: 0.84rem; outline: none; }
    .filter-bar select:focus, .filter-bar input:focus { border-color: var(--primary); }

    /* === EMPTY === */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-state .icon { font-size: 2.8rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.88rem; }

    /* === LOADING === */
    .page-loading { display: flex; align-items: center; justify-content: center; padding: 80px; color: var(--text2); font-size: 1rem; gap: 12px; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .header { padding: 0 12px; }
      .container { padding: 12px; }
      .chart-grid { grid-template-columns: 1fr; }
      .nav-btn span.nav-label { display: none; }
      .user-badge span:first-child { display: none; }
    }
  </style>
</head>
<body>

<!-- ===== TOAST ===== -->
<div id="toast"></div>

<!-- ===== AUTH SCREEN ===== -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="logo">🎣</div>
    <h1>钓鱼数据看板</h1>
    <p class="sub">记录每一次出钓，收获满满的数据洞察</p>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">登录</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">注册</button>
    </div>

    <!-- 登录表单 -->
    <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
      <input type="text" id="loginUsername" placeholder="用户名" autocomplete="username" required />
      <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password" required />
      <button type="submit" id="loginBtn">登录</button>
      <div class="auth-error" id="loginError"></div>
      <p class="auth-hint">💡 第一个注册的用户自动成为管理员</p>
    </form>

    <!-- 注册表单 -->
    <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
      <input type="text" id="regUsername" placeholder="设置用户名（至少3字符）" autocomplete="username" required minlength="3" />
      <input type="password" id="regPassword" placeholder="设置密码（至少6字符）" autocomplete="new-password" required minlength="6" />
      <input type="password" id="regPassword2" placeholder="再次确认密码" autocomplete="new-password" required />
      <button type="submit" id="registerBtn">注册并登录</button>
      <div class="auth-error" id="registerError"></div>
    </form>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="mainApp" style="display:none;">
  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <span>🎣</span>
      钓鱼数据看板
    </div>
    <nav class="header-nav" id="headerNav">
      <button class="nav-btn active" onclick="showPage('dashboard')" id="nav-dashboard">📊 <span class="nav-label">看板</span></button>
      <button class="nav-btn" onclick="showPage('record')" id="nav-record">✏️ <span class="nav-label">记录</span></button>
      <button class="nav-btn" onclick="showPage('history')" id="nav-history">📋 <span class="nav-label">历史</span></button>
      <button class="nav-btn" onclick="showPage('analysis')" id="nav-analysis">🔬 <span class="nav-label">分析</span></button>
    </nav>
    <div class="header-right">
      <div class="user-badge" id="userBadge">
        <span>👤</span>
        <span id="userDisplayName"></span>
        <span class="admin-tag" id="adminTag" style="display:none;">管理员</span>
      </div>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </header>

  <div class="container">

    <!-- ========== PAGE: 看板 ========== -->
    <div class="page active" id="page-dashboard">
      <div class="card-grid-4" id="statCards"></div>
      <div class="chart-grid">
        <div class="chart-card"><h3>🐟 渔获品种分布</h3><div class="chart-wrap"><canvas id="chartSpecies"></canvas></div></div>
        <div class="chart-card"><h3>🌡️ 温度与渔获量趋势</h3><div class="chart-wrap"><canvas id="chartTempCatch"></canvas></div></div>
        <div class="chart-card"><h3>🌤️ 天气状况分布</h3><div class="chart-wrap"><canvas id="chartWeather"></canvas></div></div>
        <div class="chart-card"><h3>📍 地点渔获统计</h3><div class="chart-wrap"><canvas id="chartLocation"></canvas></div></div>
        <div class="chart-card"><h3>💧 湿度区间渔获分析</h3><div class="chart-wrap"><canvas id="chartHumidity"></canvas></div></div>
        <div class="chart-card"><h3>🌊 气压与渔获量关系</h3><div class="chart-wrap"><canvas id="chartPressure"></canvas></div></div>
      </div>
    </div>

    <!-- ========== PAGE: 记录 ========== -->
    <div class="page" id="page-record">
      <div class="card" style="margin-bottom:20px">
        <div class="section-title">环境条件</div>
        <div class="form-grid" id="envForm">
          <div class="form-group"><label>📅 日期 <span>*</span></label><input type="date" class="form-control" id="f_date" /></div>
          <div class="form-group"><label>⏰ 时间</label><input type="time" class="form-control" id="f_time" /></div>
          <div class="form-group"><label>📍 地点 <span>*</span></label><input type="text" class="form-control" id="f_location" placeholder="如：西湖北岸、千岛湖..." /></div>
          <div class="form-group"><label>🌤️ 天气 <span>*</span></label>
            <select class="form-control" id="f_weather">
              <option value="">请选择</option>
              <option value="晴">☀️ 晴</option><option value="多云">⛅ 多云</option>
              <option value="阴">🌥️ 阴</option><option value="小雨">🌦️ 小雨</option>
              <option value="中雨">🌧️ 中雨</option><option value="大雨">⛈️ 大雨</option>
              <option value="雾">🌫️ 雾</option><option value="雪">❄️ 雪</option>
            </select>
          </div>
          <div class="form-group"><label>🌡️ 温度 (°C)</label><input type="number" class="form-control" id="f_temp" placeholder="如：22" step="0.1" /></div>
          <div class="form-group"><label>💧 湿度 (%)</label><input type="number" class="form-control" id="f_humidity" placeholder="如：65" min="0" max="100" /></div>
          <div class="form-group"><label>🌊 气压 (hPa)</label><input type="number" class="form-control" id="f_pressure" placeholder="如：1013" /></div>
          <div class="form-group"><label>💨 风向/风力</label><input type="text" class="form-control" id="f_wind" placeholder="如：东南风3级" /></div>
          <div class="form-group"><label>🌊 水温 (°C)</label><input type="number" class="form-control" id="f_water_temp" step="0.1" /></div>
          <div class="form-group"><label>🌊 水位</label>
            <select class="form-control" id="f_water_level">
              <option value="">请选择</option><option value="涨水">涨水</option><option value="平水">平水</option><option value="退水">退水</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px">
        <div class="section-title">渔获信息</div>
        <div id="catchItems"></div>
        <button class="btn btn-ghost" onclick="addCatch()" style="margin-top:4px;">➕ 添加更多品种</button>
      </div>

      <div class="card" style="margin-bottom:20px">
        <div class="section-title">补充信息</div>
        <div class="form-grid">
          <div class="form-group"><label>🎣 钓法</label>
            <select class="form-control" id="f_method">
              <option value="">请选择</option><option value="台钓">台钓</option><option value="路亚">路亚</option><option value="传统钓">传统钓</option>
              <option value="海钓">海钓</option><option value="冰钓">冰钓</option><option value="夜钓">夜钓</option><option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group"><label>🪱 饵料</label><input type="text" class="form-control" id="f_bait" placeholder="如：红虫、玉米、商品饵..." /></div>
          <div class="form-group"><label>⭐ 评分</label>
            <select class="form-control" id="f_rating">
              <option value="">请选择</option><option value="1">⭐ 1</option><option value="2">⭐⭐ 2</option><option value="3">⭐⭐⭐ 3</option>
              <option value="4">⭐⭐⭐⭐ 4</option><option value="5">⭐⭐⭐⭐⭐ 5</option>
            </select>
          </div>
          <div class="form-group full"><label>📝 备注</label><textarea class="form-control" id="f_notes" rows="3" placeholder="记录钓鱼心得、特殊情况等..."></textarea></div>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-ghost" onclick="clearForm()">🗑️ 清空</button>
        <button class="btn btn-success" onclick="saveRecord()">💾 保存记录</button>
      </div>
    </div>

    <!-- ========== PAGE: 历史 ========== -->
    <div class="page" id="page-history">
      <div class="card" style="margin-bottom:16px">
        <div class="filter-bar">
          <input type="text" id="filterSearch" placeholder="🔍 搜索地点/品种/备注..." style="flex:1;min-width:180px;" oninput="renderHistory()" />
          <select id="filterWeather" onchange="renderHistory()"><option value="">全部天气</option><option value="晴">☀️ 晴</option><option value="多云">⛅ 多云</option><option value="阴">🌥️ 阴</option><option value="小雨">🌦️ 小雨</option><option value="中雨">🌧️ 中雨</option></select>
          <select id="filterMethod" onchange="renderHistory()"><option value="">全部钓法</option><option value="台钓">台钓</option><option value="路亚">路亚</option><option value="传统钓">传统钓</option><option value="夜钓">夜钓</option></select>
          <select id="filterRating" onchange="renderHistory()"><option value="">全部评分</option><option value="5">⭐×5</option><option value="4">⭐×4+</option><option value="3">⭐×3+</option></select>
          <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 导出CSV</button>
        </div>
        <div class="table-wrap">
          <table id="historyTable"><thead><tr><th>#</th><th>日期</th><th>地点</th><th>天气</th><th>温度</th><th>气压</th><th>渔获</th><th>总重</th><th>钓法</th><th>评分</th><th>操作</th></tr></thead><tbody id="historyBody"></tbody></table>
        </div>
        <div class="empty-state" id="historyEmpty" style="display:none;"><div class="icon">🎣</div><p>还没有钓鱼记录，去记录页面添加第一条吧！</p></div>
      </div>
    </div>

    <!-- ========== PAGE: 分析 ========== -->
    <div class="page" id="page-analysis">
      <div class="insight-box" id="insightBox"><h4>🤖 智能分析洞察</h4><ul class="insight-list" id="insightList"><li>加载中...</li></ul></div>
      <div class="analysis-grid" id="analysisGrid"></div>
      <div class="section-title" style="margin-top:8px;">⚙️ 最佳钓鱼条件</div>
      <div class="card" style="margin-bottom:20px;"><div class="condition-matrix" id="conditionMatrix"></div></div>
      <div class="section-title">🐟 品种详细分析</div>
      <div class="card">
        <div class="filter-bar">
          <label style="color:var(--text2);font-size:0.84rem;">选择品种：</label>
          <select id="speciesFilter" class="form-control" style="max-width:200px;" onchange="renderSpeciesDetail()"><option value="">--请选择品种--</option></select>
        </div>
        <div id="speciesDetail"><p style="color:var(--text2);font-size:0.84rem;padding:20px 0;">请选择一个品种查看详细条件分析</p></div>
      </div>
    </div>

    <!-- ========== PAGE: 管理员 ========== -->
    <div class="page" id="page-admin">
      <div class="admin-stat-row" id="adminStats"></div>

      <div class="admin-tabs">
        <button class="admin-tab active" onclick="showAdminTab('users')" id="tab-users">👥 用户管理</button>
        <button class="admin-tab" onclick="showAdminTab('view')" id="tab-view">📊 查看用户数据</button>
      </div>

      <!-- 用户列表 -->
      <div id="admin-users-panel">
        <div id="usersList"></div>
      </div>

      <!-- 查看用户数据 -->
      <div id="admin-view-panel" style="display:none;">
        <div class="filter-bar" style="margin-bottom:20px;">
          <label style="color:var(--text2);font-size:0.84rem;">选择用户：</label>
          <select id="adminUserSelect" class="form-control" style="max-width:200px;" onchange="loadAdminUserData()"><option value="">--请选择用户--</option></select>
        </div>
        <div id="adminUserDashboard"></div>
      </div>
    </div>

  </div><!-- /container -->
</div><!-- /mainApp -->

<script>
// ============================================================
// API CONFIG
// ============================================================
const API_BASE = window.location.origin + '/api';
let currentUser = null;
let records = [];
let catchCount = 1;
let editingRecordId = null;
let charts = {};

// ============================================================
// UTILS
// ============================================================
function api(path, method='GET', body=null) {
  const headers = { 'Content-Type': 'application/json' };
  const token = localStorage.getItem('fishing_token');
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  return fetch(API_BASE + path, opts).then(r => {
    if (r.status === 401) { logout(); throw new Error('未登录'); }
    return r.json().then(d => { if (!r.ok) throw new Error(d.detail || '请求失败'); return d; });
  });
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'success' ? '#00c97d' : type === 'error' ? '#e74c3c' : '#1a73e8';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2800);
}

function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }

function weatherIcon(w) {
  return {晴:'☀️',多云:'⛅',阴:'🌥️',小雨:'🌦️',中雨:'🌧️',大雨:'⛈️',雾:'🌫️',雪:'❄️'}[w] || '🌤️';
}

function ratingStars(r) { return r ? '⭐'.repeat(r) : '-'; }

function COLORS(n) {
  const p = ['#1a73e8','#00b894','#fd7e14','#e74c3c','#9b59b6','#f1c40f','#1abc9c','#e67e22','#3498db','#2ecc71'];
  return Array.from({length:n},(_,i)=>p[i%p.length]);
}

// ============================================================
// AUTH
// ============================================================
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  if (tab === 'login') document.getElementById('loginForm').classList.add('active');
  else document.getElementById('registerForm').classList.add('active');
  document.querySelector(`.auth-tab:nth-child(${tab==='login'?1:2})`).classList.add('active');
}

function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '登录中...';
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  document.getElementById('loginError').style.display = 'none';

  api('/login', 'POST', { username, password })
    .then(data => {
      localStorage.setItem('fishing_token', data.token);
      localStorage.setItem('fishing_user', JSON.stringify(data.user));
      afterLogin(data.user);
    })
    .catch(err => {
      document.getElementById('loginError').textContent = err.message;
      document.getElementById('loginError').style.display = 'block';
    })
    .finally(() => { btn.disabled = false; btn.textContent = '登录'; });
}

function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const password2 = document.getElementById('regPassword2').value;
  const errEl = document.getElementById('registerError');
  errEl.style.display = 'none';

  if (password !== password2) { errEl.textContent = '两次密码不一致'; errEl.style.display = 'block'; return; }
  if (username.length < 3) { errEl.textContent = '用户名至少3个字符'; errEl.style.display = 'block'; return; }
  if (password.length < 6) { errEl.textContent = '密码至少6个字符'; errEl.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = '注册中...';
  api('/register', 'POST', { username, password })
    .then(data => {
      localStorage.setItem('fishing_token', data.token);
      localStorage.setItem('fishing_user', JSON.stringify(data.user));
      afterLogin(data.user);
    })
    .catch(err => {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    })
    .finally(() => { btn.disabled = false; btn.textContent = '注册并登录'; });
}

function afterLogin(user) {
  currentUser = user;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('userDisplayName').textContent = user.username;
  document.getElementById('adminTag').style.display = user.is_admin ? 'inline' : 'none';

  if (user.is_admin) {
    const adminBtn = document.createElement('button');
    adminBtn.className = 'nav-btn';
    adminBtn.id = 'nav-admin';
    adminBtn.innerHTML = '⚙️ <span class="nav-label">管理</span>';
    adminBtn.onclick = () => showPage('admin');
    document.getElementById('headerNav').appendChild(adminBtn);
  }

  loadRecords().then(() => {
    renderDashboard();
    setTimeout(() => showToast('🎣 欢迎回来，' + user.username + '！'), 300);
  });
}

function logout() {
  localStorage.removeItem('fishing_token');
  localStorage.removeItem('fishing_user');
  currentUser = null;
  records = [];
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
  const adminBtn = document.getElementById('nav-admin');
  if (adminBtn) adminBtn.remove();
}

function checkAuth() {
  const token = localStorage.getItem('fishing_token');
  const userStr = localStorage.getItem('fishing_user');
  if (!token || !userStr) return;
  const user = JSON.parse(userStr);
  afterLogin(user);
}

// ============================================================
// RECORDS API
// ============================================================
async function loadRecords() {
  try { records = await api('/records'); }
  catch(e) { records = []; }
}

// ============================================================
// NAVIGATION
// ============================================================
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const nav = document.getElementById('nav-' + name);
  if (nav) nav.classList.add('active');

  if (name === 'dashboard') renderDashboard();
  if (name === 'history') renderHistory();
  if (name === 'analysis') renderAnalysis();
  if (name === 'admin') { loadAdminUsers(); showAdminTab('users'); }
}

// ============================================================
// FORM
// ============================================================
function addCatch() {
  const container = document.getElementById('catchItems');
  const idx = catchCount++;
  const div = document.createElement('div');
  div.className = 'catch-item';
  div.dataset.index = idx;
  div.innerHTML = `
    <div class="catch-item-header">
      <span>🐟 渔获 #${idx+1}</span>
      <button class="btn btn-ghost btn-sm" onclick="removeCatch(${idx})">移除</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>品种 <span>*</span></label><input type="text" class="form-control catch-species" placeholder="如：草鱼、鲫鱼..." /></div>
      <div class="form-group"><label>数量（条）</label><input type="number" class="form-control catch-count" placeholder="1" value="1" min="1" /></div>
      <div class="form-group"><label>总重量（g）</label><input type="number" class="form-control catch-weight" placeholder="如：500" /></div>
      <div class="form-group"><label>最大尾重（g）</label><input type="number" class="form-control catch-max-weight" placeholder="如：300" /></div>
    </div>`;
  container.appendChild(div);
}

function removeCatch(idx) {
  const items = document.querySelectorAll('.catch-item');
  if (items.length <= 1) { showToast('至少保留一条渔获', 'error'); return; }
  document.querySelector(`.catch-item[data-index="${idx}"]`)?.remove();
}

function getCatchItems() {
  const result = [];
  document.querySelectorAll('.catch-item').forEach(item => {
    const species = item.querySelector('.catch-species').value.trim();
    const count = parseInt(item.querySelector('.catch-count').value) || 1;
    const weight = parseFloat(item.querySelector('.catch-weight').value) || 0;
    const maxWeight = parseFloat(item.querySelector('.catch-max-weight').value) || 0;
    if (species) result.push({ species, count, weight, maxWeight });
  });
  return result;
}

async function saveRecord() {
  const date = document.getElementById('f_date').value;
  const location = document.getElementById('f_location').value.trim();
  const weather = document.getElementById('f_weather').value;
  if (!date) { showToast('请填写日期', 'error'); return; }
  if (!location) { showToast('请填写地点', 'error'); return; }
  if (!weather) { showToast('请选择天气', 'error'); return; }

  const catches = getCatchItems();
  if (!catches.length) { showToast('请至少填写一条渔获品种', 'error'); return; }

  const body = {
    date,
    time: document.getElementById('f_time').value,
    location,
    weather,
    temp: parseFloat(document.getElementById('f_temp').value) || null,
    humidity: parseFloat(document.getElementById('f_humidity').value) || null,
    pressure: parseFloat(document.getElementById('f_pressure').value) || null,
    wind: document.getElementById('f_wind').value,
    water_temp: parseFloat(document.getElementById('f_water_temp').value) || null,
    water_level: document.getElementById('f_water_level').value,
    method: document.getElementById('f_method').value,
    bait: document.getElementById('f_bait').value,
    rating: parseInt(document.getElementById('f_rating').value) || null,
    notes: document.getElementById('f_notes').value,
    catches
  };

  try {
    if (editingRecordId) {
      await api(`/records/${editingRecordId}`, 'PUT', body);
      showToast('✅ 记录已更新');
    } else {
      await api('/records', 'POST', body);
      showToast('✅ 记录保存成功');
    }
    clearForm();
    await loadRecords();
    renderHistory();
  } catch(e) { showToast(e.message, 'error'); }
}

function clearForm() {
  ['f_date','f_time','f_location','f_weather','f_temp','f_humidity','f_pressure',
   'f_wind','f_water_temp','f_water_level','f_method','f_bait','f_rating','f_notes'
  ].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  document.getElementById('catchItems').innerHTML = '';
  catchCount = 1;
  editingRecordId = null;
  addCatch();
  document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
}

function editRecordFromHistory(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  editingRecordId = id;
  document.getElementById('f_date').value = r.date || '';
  document.getElementById('f_time').value = r.time || '';
  document.getElementById('f_location').value = r.location || '';
  document.getElementById('f_weather').value = r.weather || '';
  document.getElementById('f_temp').value = r.temp ?? '';
  document.getElementById('f_humidity').value = r.humidity ?? '';
  document.getElementById('f_pressure').value = r.pressure ?? '';
  document.getElementById('f_wind').value = r.wind || '';
  document.getElementById('f_water_temp').value = r.water_temp ?? '';
  document.getElementById('f_water_level').value = r.water_level || '';
  document.getElementById('f_method').value = r.method || '';
  document.getElementById('f_bait').value = r.bait || '';
  document.getElementById('f_rating').value = r.rating ?? '';
  document.getElementById('f_notes').value = r.notes || '';

  const container = document.getElementById('catchItems');
  container.innerHTML = '';
  catchCount = 0;
  (r.catches || []).forEach((c, idx) => {
    addCatch();
    const items = document.querySelectorAll('.catch-item');
    const item = items[idx];
    item.querySelector('.catch-species').value = c.species || '';
    item.querySelector('.catch-count').value = c.count || 1;
    item.querySelector('.catch-weight').value = c.weight || '';
    item.querySelector('.catch-max-weight').value = c.maxWeight || '';
  });
  if (!r.catches || !r.catches.length) addCatch();
  showPage('record');
  showToast('已加载记录，修改后保存', 'info');
}

async function deleteRecordFromHistory(id) {
  if (!confirm('确认删除这条记录？')) return;
  try {
    await api(`/records/${id}`, 'DELETE');
    await loadRecords();
    renderHistory();
    showToast('记录已删除');
  } catch(e) { showToast(e.message, 'error'); }
}

// ============================================================
// HISTORY
// ============================================================
function renderHistory() {
  const tbody = document.getElementById('historyBody');
  const empty = document.getElementById('historyEmpty');
  const table = document.getElementById('historyTable');
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const wFilter = document.getElementById('filterWeather').value;
  const mFilter = document.getElementById('filterMethod').value;
  const rFilter = parseInt(document.getElementById('filterRating').value) || 0;

  let filtered = records.filter(r => {
    if (wFilter && r.weather !== wFilter) return false;
    if (mFilter && r.method !== mFilter) return false;
    if (rFilter && (r.rating||0) < rFilter) return false;
    if (search) {
      const str = [r.location, r.notes, r.bait, ...(r.catches||[]).map(c=>c.species)].join(' ').toLowerCase();
      if (!str.includes(search)) return false;
    }
    return true;
  });

  if (!filtered.length) {
    tbody.innerHTML = ''; empty.style.display = 'block'; table.style.display = 'none';
    return;
  }
  empty.style.display = 'none'; table.style.display = 'table';
  tbody.innerHTML = filtered.map((r, i) => `
    <tr>
      <td style="color:var(--text2)">${filtered.length-i}</td>
      <td>${r.date}${r.time?' '+r.time:''}</td>
      <td><strong>${r.location}</strong></td>
      <td>${weatherIcon(r.weather)} ${r.weather}</td>
      <td>${r.temp!=null?r.temp+'°C':'-'}</td>
      <td>${r.pressure!=null?r.pressure+'hPa':'-'}</td>
      <td>${(r.catches||[]).map(c=>`<span class="badge badge-blue">${c.species}${c.count>1?'×'+c.count:''}</span>`).join(' ')}</td>
      <td>${r.totalWeight>0?'<strong>'+r.totalWeight+'g</strong>':'-'}</td>
      <td>${r.method||'-'}</td>
      <td>${ratingStars(r.rating)}</td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="editRecordFromHistory(${r.id})" style="margin-right:4px;">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRecordFromHistory(${r.id})">🗑️</button>
      </td>
    </tr>`).join('');
}

function exportCSV() {
  if (!records.length) { showToast('暂无数据', 'error'); return; }
  const rows = [['日期','时间','地点','天气','温度','湿度','气压','渔获','总重量','总数量','钓法','饵料','评分','备注']];
  records.forEach(r => rows.push([
    r.date, r.time||'', r.location, r.weather, r.temp??'', r.humidity??'', r.pressure??'',
    (r.catches||[]).map(c=>c.species+(c.count>1?'×'+c.count:'')).join('/'),
    r.totalWeight||'', r.totalCount||'', r.method||'', r.bait||'', r.rating||'', r.notes||''
  ]));
  const csv = rows.map(r => r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `fishing_records_${currentUser.username}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('导出成功！');
}

// ============================================================
// DASHBOARD
// ============================================================
function destroyChart(key) {
  if (charts[key]) { charts[key].destroy(); delete charts[key]; }
}

function renderDashboard() {
  const totalSessions = records.length;
  const totalWeight = records.reduce((s,r)=>s+(r.totalWeight||0),0);
  const totalFish = records.reduce((s,r)=>s+(r.totalCount||0),0);
  const allSpecies = new Set();
  records.forEach(r=>(r.catches||[]).forEach(c=>allSpecies.add(c.species)));
  const locations = new Set(records.map(r=>r.location));
  const bestRating = records.filter(r=>(r.rating||0)>=4).length;

  document.getElementById('statCards').innerHTML = `
    <div class="stat-card"><div class="stat-icon">🎣</div><div class="stat-info"><div class="label">出钓次数</div><div class="value">${totalSessions}</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(0,185,132,0.15)">⚖️</div><div class="stat-info"><div class="label">总渔获</div><div class="value">${totalWeight>=1000?(totalWeight/1000).toFixed(1)+'kg':totalWeight+'g'}</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(253,126,20,0.15)">🐟</div><div class="stat-info"><div class="label">总数量</div><div class="value">${totalFish}</div><div class="sub">${allSpecies.size} 个品种</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(155,89,182,0.15)">📍</div><div class="stat-info"><div class="label">钓点</div><div class="value">${locations.size}</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(255,193,7,0.15)">⭐</div><div class="stat-info"><div class="label">高评分</div><div class="value">${bestRating}</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(231,76,60,0.15)">📈</div><div class="stat-info"><div class="label">均渔获</div><div class="value">${totalSessions?Math.round(totalWeight/totalSessions):0}g</div></div></div>`;

  if (!records.length) return;
  renderSpeciesChart();
  renderTempCatchChart();
  renderWeatherChart();
  renderLocationChart();
  renderHumidityChart();
  renderPressureChart();
}

function renderSpeciesChart() {
  destroyChart('species');
  const m = {};
  records.forEach(r=>(r.catches||[]).forEach(c=>{ if(c.species) m[c.species]=(m[c.species]||0)+(c.weight||0); }));
  const sorted = Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if (!sorted.length) return;
  const ctx = document.getElementById('chartSpecies').getContext('2d');
  charts['species'] = new Chart(ctx, {
    type:'doughnut',
    data:{ labels:sorted.map(x=>x[0]), datasets:[{ data:sorted.map(x=>x[1]), backgroundColor:COLORS(sorted.length), borderWidth:2, borderColor:'#1e2d42' }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ color:'#a8b8d0', font:{size:11}, boxWidth:12 } }, tooltip:{ callbacks:{ label:c=>` ${c.label}: ${c.raw}g` } } } }
  });
}

function renderTempCatchChart() {
  destroyChart('tempCatch');
  const sorted = [...records].filter(r=>r.temp!=null).sort((a,b)=>a.date.localeCompare(b.date)).slice(-20);
  if (!sorted.length) return;
  const ctx = document.getElementById('chartTempCatch').getContext('2d');
  charts['tempCatch'] = new Chart(ctx, {
    type:'line',
    data:{
      labels:sorted.map(r=>r.date),
      datasets:[
        { label:'渔获(g)', data:sorted.map(r=>r.totalWeight||0), borderColor:'#00b894', backgroundColor:'rgba(0,185,132,0.1)', tension:0.4, fill:true, pointRadius:4, yAxisID:'y' },
        { label:'温度(°C)', data:sorted.map(r=>r.temp), borderColor:'#fd7e14', backgroundColor:'transparent', tension:0.4, pointRadius:4, borderDash:[5,3], yAxisID:'y1' }
      ]
    },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{ color:'#a8b8d0', font:{size:11} } } },
      scales:{ x:{ ticks:{ color:'#a8b8d0', maxTicksLimit:8 }, grid:{ color:'rgba(45,66,99,0.3)' } },
              y:{ position:'left', ticks:{ color:'#00b894' }, grid:{ color:'rgba(45,66,99,0.3)' } },
              y1:{ position:'right', ticks:{ color:'#fd7e14' }, grid:{ drawOnChartArea:false } } }
    }
  });
}

function renderWeatherChart() {
  destroyChart('weather');
  const m = {}; records.forEach(r=>{ if(r.weather) m[r.weather]=(m[r.weather]||0)+1; });
  const sorted = Object.entries(m).sort((a,b)=>b[1]-a[1]);
  if (!sorted.length) return;
  const ctx = document.getElementById('chartWeather').getContext('2d');
  charts['weather'] = new Chart(ctx, {
    type:'bar',
    data:{ labels:sorted.map(x=>weatherIcon(x[0])+' '+x[0]), datasets:[{ label:'出钓次数', data:sorted.map(x=>x[1]), backgroundColor:COLORS(sorted.length), borderRadius:6 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } },
      scales:{ x:{ ticks:{ color:'#a8b8d0' }, grid:{ color:'rgba(45,66,99,0.3)' } }, y:{ ticks:{ color:'#a8b8d0' }, grid:{ color:'rgba(45,66,99,0.3)' } } } }
  });
}

function renderLocationChart() {
  destroyChart('location');
  const m = {}; records.forEach(r=>{ if(r.location) m[r.location]=(m[r.location]||0)+(r.totalWeight||0); });
  const sorted = Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if (!sorted.length) return;
  const ctx = document.getElementById('chartLocation').getContext('2d');
  charts['location'] = new Chart(ctx, {
    type:'bar',
    data:{ labels:sorted.map(x=>x[0]), datasets:[{ data:sorted.map(x=>x[1]), backgroundColor:'rgba(26,115,232,0.7)', borderRadius:6 }] },
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } },
      scales:{ x:{ ticks:{ color:'#a8b8d0' }, grid:{ color:'rgba(45,66,99,0.3)' } }, y:{ ticks:{ color:'#a8b8d0', font:{size:11} }, grid:{ color:'rgba(45,66,99,0.3)' } } } }
  });
}

function renderHumidityChart() {
  destroyChart('humidity');
  const buckets={'30-50%':[],'50-65%':[],'65-80%':[],'80-100%':[]};
  records.filter(r=>r.humidity!=null).forEach(r=>{
    const h=r.humidity; const b = h<50?'30-50%':h<65?'50-65%':h<80?'65-80%':'80-100%';
    buckets[b].push(r.totalWeight||0);
  });
  const labels=Object.keys(buckets);
  const avgs=labels.map(k=>{ const a=buckets[k]; return a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):0; });
  const ctx = document.getElementById('chartHumidity').getContext('2d');
  charts['humidity'] = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets:[{ label:'平均渔获(g)', data:avgs, backgroundColor:COLORS(4), borderRadius:6 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } },
      scales:{ x:{ ticks:{ color:'#a8b8d0' }, grid:{ color:'rgba(45,66,99,0.3)' } }, y:{ ticks:{ color:'#a8b8d0' }, grid:{ color:'rgba(45,66,99,0.3)' } } } }
  });
}

function renderPressureChart() {
  destroyChart('pressure');
  const pts = records.filter(r=>r.pressure!=null&&(r.totalWeight||0)>0).map(r=>({x:r.pressure, y:r.totalWeight||0}));
  if (!pts.length) return;
  const ctx = document.getElementById('chartPressure').getContext('2d');
  charts['pressure'] = new Chart(ctx, {
    type:'scatter',
    data:{ datasets:[{ label:'气压 vs 渔获', data:pts, backgroundColor:'rgba(26,115,232,0.6)', pointRadius:6 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{ color:'#a8b8d0' } } },
      scales:{ x:{ ticks:{color:'#a8b8d0'}, grid:{color:'rgba(45,66,99,0.3)'}, title:{display:true,text:'气压(hPa)',color:'#a8b8d0'} },
               y:{ ticks:{color:'#a8b8d0'}, grid:{color:'rgba(45,66,99,0.3)'}, title:{display:true,text:'渔获(g)',color:'#a8b8d0'} } } }
  });
}

// ============================================================
// ANALYSIS
// ============================================================
function renderAnalysis() {
  if (!records.length) {
    document.getElementById('insightList').innerHTML='<li>暂无数据，请先录入钓鱼记录</li>';
    document.getElementById('analysisGrid').innerHTML='';
    document.getElementById('conditionMatrix').innerHTML='';
    return;
  }
  renderInsights();
  renderAnalysisCards();
  renderConditionMatrix();
  renderSpeciesFilter();
}

function renderInsights() {
  const insights=[];
  const wMap={};
  records.forEach(r=>{ if(!r.weather)return; if(!wMap[r.weather])wMap[r.weather]=[]; wMap[r.weather].push(r.totalWeight||0); });
  const wBest=Object.entries(wMap).map(([k,v])=>({k,avg:avg(v)})).sort((a,b)=>b.avg-a.avg)[0];
  if(wBest) insights.push(`${weatherIcon(wBest.k)} <strong>${wBest.k}</strong>天气平均渔获最高（${Math.round(wBest.avg)}g）`);

  const sMap={};
  records.forEach(r=>(r.catches||[]).forEach(c=>{ if(!c.species)return; sMap[c.species]=(sMap[c.species]||0)+(c.count||1); }));
  const topS=Object.entries(sMap).sort((a,b)=>b[1]-a[1]).slice(0,3).map(x=>x[0]);
  if(topS.length) insights.push(`🐟 最常钓到：<strong>${topS.join('、')}</strong>`);

  const lMap={};
  records.forEach(r=>{ if(!r.location)return; if(!lMap[r.location])lMap[r.location]=[]; lMap[r.location].push(r.totalWeight||0); });
  const lBest=Object.entries(lMap).filter(([,v])=>v.length>=2).map(([k,v])=>({k,avg:avg(v)})).sort((a,b)=>b.avg-a.avg)[0];
  if(lBest) insights.push(`📍 <strong>${lBest.k}</strong> 平均渔获最高（${Math.round(lBest.avg)}g/次）`);

  if(!insights.length) insights.push('继续录入更多数据，洞察将更加精准');
  document.getElementById('insightList').innerHTML=insights.map(t=>`<li>${t}</li>`).join('');
}

function renderAnalysisCards() {
  const sWeightMap={};
  records.forEach(r=>(r.catches||[]).forEach(c=>{
    if(!c.species)return;
    if(!sWeightMap[c.species]) sWeightMap[c.species]={weight:0,count:0,sessions:0};
    sWeightMap[c.species].weight+=c.weight||0; sWeightMap[c.species].count+=c.count||1; sWeightMap[c.species].sessions++;
  }));
  const specRank=Object.entries(sWeightMap).sort((a,b)=>b[1].weight-a[1].weight).slice(0,6);
  const maxW=specRank[0]?.[1]?.weight||1;

  const lMap={};
  records.forEach(r=>{ if(!r.location)return; if(!lMap[r.location])lMap[r.location]={weight:0,sessions:0}; lMap[r.location].weight+=r.totalWeight||0; lMap[r.location].sessions++; });
  const locRank=Object.entries(lMap).sort((a,b)=>b[1].weight-a[1].weight).slice(0,6);
  const maxLW=locRank[0]?.[1]?.weight||1;

  document.getElementById('analysisGrid').innerHTML=`
    <div class="analysis-card"><h3>🏆 品种排行（总重）</h3>
      ${specRank.map(([name,info],i)=>`<div class="rank-item"><div class="rank-num ${i<3?'rank-'+(i+1):'rank-other'}">${i+1}</div><div class="rank-info"><div class="name">${name}</div><div class="detail">${info.sessions}次 · ${info.count}条</div></div><div class="rank-bar-wrap"><div class="rank-bar"><div class="rank-bar-fill" style="width:${Math.round(info.weight/maxW*100)}%"></div></div></div><div class="rank-val">${info.weight}g</div></div>`).join('')}
    </div>
    <div class="analysis-card"><h3>📍 钓点排行</h3>
      ${locRank.map(([name,info],i)=>`<div class="rank-item"><div class="rank-num ${i<3?'rank-'+(i+1):'rank-other'}">${i+1}</div><div class="rank-info"><div class="name">${name}</div><div class="detail">${info.sessions}次出钓</div></div><div class="rank-bar-wrap"><div class="rank-bar"><div class="rank-bar-fill" style="width:${Math.round(info.weight/maxLW*100)}%"></div></div></div><div class="rank-val">${info.weight}g</div></div>`).join('')}
    </div>`;
}

function renderConditionMatrix() {
  const matrix=document.getElementById('conditionMatrix');
  const items=[];
  const wMap={}; records.forEach(r=>{ if(!r.weather)return; if(!wMap[r.weather])wMap[r.weather]=[]; wMap[r.weather].push(r.totalWeight||0); });
  const wArr=Object.entries(wMap).map(([k,v])=>({k,avg:avg(v)})).sort((a,b)=>b.avg-a.avg); if(wArr.length) items.push({label:'🌤️ 最佳天气',value:wArr[0].k,sub:`均渔获 ${Math.round(wArr[0].avg)}g`});
  const tBuckets={}; records.filter(r=>r.temp!=null).forEach(r=>{ const lo=Math.floor(r.temp/5)*5; const key=`${lo}~${lo+5}°C`; if(!tBuckets[key])tBuckets[key]=[]; tBuckets[key].push(r.totalWeight||0); });
  const tArr=Object.entries(tBuckets).filter(([,v])=>v.length>=1).map(([k,v])=>({k,avg:avg(v)})).sort((a,b)=>b.avg-a.avg); if(tArr.length) items.push({label:'🌡️ 最佳温度',value:tArr[0].k,sub:`均渔获 ${Math.round(tArr[0].avg)}g`});
  const hBuckets={'<50%':[],'50~65%':[],'65~80%':[],'≥80%':[]}; records.filter(r=>r.humidity!=null).forEach(r=>{ const h=r.humidity; if(h<50)hBuckets['<50%'].push(r.totalWeight||0); else if(h<65)hBuckets['50~65%'].push(r.totalWeight||0); else if(h<80)hBuckets['65~80%'].push(r.totalWeight||0); else hBuckets['≥80%'].push(r.totalWeight||0); });
  const hArr=Object.entries(hBuckets).filter(([,v])=>v.length>=1).map(([k,v])=>({k,avg:avg(v)})).sort((a,b)=>b.avg-a.avg); if(hArr.length) items.push({label:'💧 最佳湿度',value:hArr[0].k,sub:`均渔获 ${Math.round(hArr[0].avg)}g`});
  const pBuckets={'<1000hPa':[],'1000~1010':[],'1010~1020':[],'≥1020hPa':[]}; records.filter(r=>r.pressure!=null).forEach(r=>{ const p=r.pressure; if(p<1000)pBuckets['<1000hPa'].push(r.totalWeight||0); else if(p<1010)pBuckets['1000~1010'].push(r.totalWeight||0); else if(p<1020)pBuckets['1010~1020'].push(r.totalWeight||0); else pBuckets['≥1020hPa'].push(r.totalWeight||0); });
  const pArr=Object.entries(pBuckets).filter(([,v])=>v.length>=1).map(([k,v])=>({k,avg:avg(v)})).sort((a,b)=>b.avg-a.avg); if(pArr.length) items.push({label:'🌊 最佳气压',value:pArr[0].k,sub:`均渔获 ${Math.round(pArr[0].avg)}g`});
  const mMap={}; records.forEach(r=>{ if(!r.method)return; if(!mMap[r.method])mMap[r.method]=[]; mMap[r.method].push(r.totalWeight||0); });
  const mArr=Object.entries(mMap).map(([k,v])=>({k,avg:avg(v)})).sort((a,b)=>b.avg-a.avg); if(mArr.length) items.push({label:'🎣 最佳钓法',value:mArr[0].k,sub:`均渔获 ${Math.round(mArr[0].avg)}g`});
  matrix.innerHTML=items.length ? items.map(it=>`<div class="condition-item"><div class="cond-label">${it.label}</div><div class="cond-value">${it.value}</div><div class="cond-sub">${it.sub}</div></div>`).join('') : '<p style="color:var(--text2);font-size:0.84rem;padding:20px;">数据不足</p>';
}

function renderSpeciesFilter() {
  const sel=document.getElementById('speciesFilter');
  const species=new Set();
  records.forEach(r=>(r.catches||[]).forEach(c=>{ if(c.species)species.add(c.species); }));
  sel.innerHTML='<option value="">--请选择品种--</option>'+[...species].sort().map(s=>`<option value="${s}">${s}</option>`).join('');
  document.getElementById('speciesDetail').innerHTML='<p style="color:var(--text2);font-size:0.84rem;padding:20px 0;">请选择一个品种</p>';
}

function renderSpeciesDetail() {
  const sp=document.getElementById('speciesFilter').value;
  const container=document.getElementById('speciesDetail');
  if(!sp){container.innerHTML='<p style="color:var(--text2);font-size:0.84rem;padding:20px 0;">请选择一个品种</p>';return;}
  const spRecs=records.filter(r=>(r.catches||[]).some(c=>c.species===sp));
  if(!spRecs.length){container.innerHTML='<p style="color:var(--text2);">暂无记录</p>';return;}
  const totalWeight=spRecs.reduce((s,r)=>{const c=r.catches.find(x=>x.species===sp);return s+(c?.weight||0);},0);
  const totalCount=spRecs.reduce((s,r)=>{const c=r.catches.find(x=>x.species===sp);return s+(c?.count||1);},0);
  const wMap={}; spRecs.forEach(r=>{if(!r.weather)return;const c=r.catches.find(x=>x.species===sp);if(!wMap[r.weather])wMap[r.weather]=0;wMap[r.weather]+=c?.weight||0;});
  const wBest=Object.entries(wMap).sort((a,b)=>b[1]-a[1])[0];
  const avgTemp=spRecs.filter(r=>r.temp!=null).length?avg(spRecs.filter(r=>r.temp!=null).map(r=>r.temp)):null;
  const avgPressure=spRecs.filter(r=>r.pressure!=null).length?avg(spRecs.filter(r=>r.pressure!=null).map(r=>r.pressure)):null;
  container.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:16px;">
      <div class="condition-item"><div class="cond-label">📊 上钩次数</div><div class="cond-value">${totalCount} 条</div><div class="cond-sub">共 ${spRecs.length} 次</div></div>
      <div class="condition-item"><div class="cond-label">⚖️ 总重量</div><div class="cond-value">${totalWeight}g</div><div class="cond-sub">均 ${spRecs.length?Math.round(totalWeight/spRecs.length):0}g/次</div></div>
      ${wBest?`<div class="condition-item"><div class="cond-label">🌤️ 最佳天气</div><div class="cond-value">${weatherIcon(wBest[0])} ${wBest[0]}</div><div class="cond-sub">总重 ${wBest[1]}g</div></div>`:''}
      ${avgTemp!=null?`<div class="condition-item"><div class="cond-label">🌡️ 平均温度</div><div class="cond-value">${avgTemp.toFixed(1)}°C</div></div>`:''}
      ${avgPressure!=null?`<div class="condition-item"><div class="cond-label">🌊 平均气压</div><div class="cond-value">${avgPressure.toFixed(0)}hPa</div></div>`:''}
    </div>
    <div class="table-wrap"><table><thead><tr><th>日期</th><th>地点</th><th>天气</th><th>重量</th></tr></thead><tbody>
      ${spRecs.slice(0,10).map(r=>{const c=r.catches.find(x=>x.species===sp);return`<tr><td>${r.date}</td><td>${r.location}</td><td>${weatherIcon(r.weather)} ${r.weather}</td><td><strong>${c?.weight||0}g</strong></td></tr>`;}).join('')}
    </tbody></table></div>`;
}

let adminAllUsers = [];
let adminUserRecords = [];

async function loadAdminUsers() {
  try {
    adminAllUsers = await api('/admin/users');
    renderAdminStats();
    renderUsersList();
    renderAdminUserSelect();
  } catch(e) { showToast('加载用户失败: '+e.message, 'error'); }
}

function renderAdminStats() {
  const totalUsers = adminAllUsers.length;
  const totalRecords = adminAllUsers.reduce((s,u)=>s+u.record_count,0);
  const totalWeight = adminAllUsers.reduce((s,u)=>s+u.total_weight,0);
  const admins = adminAllUsers.filter(u=>u.is_admin).length;
  document.getElementById('adminStats').innerHTML = `
    <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-info"><div class="label">总用户数</div><div class="value">${totalUsers}</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(0,185,132,0.15)">📝</div><div class="stat-info"><div class="label">总记录数</div><div class="value">${totalRecords}</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(253,126,20,0.15)">⚖️</div><div class="stat-info"><div class="label">总渔获</div><div class="value">${totalWeight>=1000?(totalWeight/1000).toFixed(1)+'kg':totalWeight+'g'}</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(255,193,7,0.15)">⭐</div><div class="stat-info"><div class="label">管理员数</div><div class="value">${admins}</div></div></div>`;
}

function renderUsersList() {
  const list = document.getElementById('usersList');
  if (!adminAllUsers.length) { list.innerHTML = '<div class="empty-state"><div class="icon">👥</div><p>暂无注册用户</p></div>'; return; }
  list.innerHTML = adminAllUsers.map(u => `
    <div class="admin-user-card">
      <div class="admin-user-avatar">${u.username.charAt(0).toUpperCase()}</div>
      <div class="admin-user-info">
        <div class="username">${u.username} ${u.is_admin?'<span style="background:var(--accent2);color:#fff;border-radius:10px;padding:1px 8px;font-size:0.72rem;margin-left:6px;">管理员</span>':''}</div>
        <div class="meta">注册于 ${u.created_at} · ${u.record_count} 条记录 · ${u.total_weight>=1000?(u.total_weight/1000).toFixed(1)+'kg':u.total_weight+'g'}渔获</div>
      </div>
      <div class="admin-user-actions">
        <label class="switch">
          <input type="checkbox" ${u.is_admin?'checked':''} onchange="toggleAdmin(${u.id},this.checked)" />
          <span class="slider"></span>
        </label>
        ${!u.is_admin ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">🗑️ 删除</button>` : ''}
      </div>
    </div>`).join('');
}

function renderAdminUserSelect() {
  const sel = document.getElementById('adminUserSelect');
  sel.innerHTML = '<option value="">--请选择用户--</option>' + adminAllUsers.map(u=>`<option value="${u.id}">${u.username}</option>`).join('');
}

async function loadAdminUserData() {
  const userId = parseInt(document.getElementById('adminUserSelect').value);
  const container = document.getElementById('adminUserDashboard');
  if (!userId) { container.innerHTML = ''; return; }
  try {
    const data = await api(`/admin/users/${userId}/records`);
    adminUserRecords = data.records;
    renderAdminUserDashboard(data.user.username, data.records);
  } catch(e) { container.innerHTML = `<p style="color:var(--danger)">加载失败: ${e.message}</p>`; }
}

function renderAdminUserDashboard(username, userRecs) {
  const container = document.getElementById('adminUserDashboard');
  if (!userRecs.length) { container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>${username} 还没有钓鱼记录</p></div>`; return; }
  const totalSessions = userRecs.length;
  const totalWeight = userRecs.reduce((s,r)=>s+(r.totalWeight||0),0);
  const totalFish = userRecs.reduce((s,r)=>s+(r.totalCount||0),0);
  const sMap={}; userRecs.forEach(r=>(r.catches||[]).forEach(c=>{ if(!sMap[c.species])sMap[c.species]=0; sMap[c.species]+=c.weight||0; }));
  const topSpecies = Object.entries(sMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxTW = topSpecies[0]?.[1]||1;
  container.innerHTML = `
    <div class="card-grid-4" style="margin-bottom:20px;">
      <div class="stat-card"><div class="stat-icon">🎣</div><div class="stat-info"><div class="label">出钓次数</div><div class="value">${totalSessions}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(0,185,132,0.15)">⚖️</div><div class="stat-info"><div class="label">总渔获</div><div class="value">${totalWeight>=1000?(totalWeight/1000).toFixed(1)+'kg':totalWeight+'g'}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(253,126,20,0.15)">🐟</div><div class="stat-info"><div class="label">总数量</div><div class="value">${totalFish}</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(155,89,182,0.15)">📈</div><div class="stat-info"><div class="label">均渔获</div><div class="value">${totalSessions?Math.round(totalWeight/totalSessions):0}g</div></div></div>
    </div>
    <div class="analysis-card" style="margin-bottom:20px;"><h3>🏆 ${username} 的品种排行</h3>
      ${topSpecies.map(([name,w],i)=>`<div class="rank-item"><div class="rank-num ${i<3?'rank-'+(i+1):'rank-other'}">${i+1}</div><div class="rank-info"><div class="name">${name}</div><div class="detail">${w}g</div></div><div class="rank-bar-wrap"><div class="rank-bar"><div class="rank-bar-fill" style="width:${Math.round(w/maxTW*100)}%"></div></div></div></div>`).join('')}
    </div>
    <div class="card"><h3 class="section-title" style="margin-bottom:12px;">📋 最近记录</h3>
      <div class="table-wrap"><table><thead><tr><th>日期</th><th>地点</th><th>天气</th><th>渔获</th><th>重量</th><th>评分</th></tr></thead><tbody>
        ${userRecs.slice(0,20).map(r=>`<tr><td>${r.date}</td><td><strong>${r.location}</strong></td><td>${weatherIcon(r.weather)}</td><td>${(r.catches||[]).map(c=>`<span class="badge badge-blue">${c.species}${c.count>1?'×'+c.count:''}</span>`).join(' ')}</td><td>${r.totalWeight>0?'<strong>'+r.totalWeight+'g</strong>':'-'}</td><td>${ratingStars(r.rating)}</td></tr>`).join('')}
      </tbody></table></div>
    </div>`;
}

function showAdminTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('admin-users-panel').style.display = tab==='users'?'block':'none';
  document.getElementById('admin-view-panel').style.display = tab==='view'?'block':'none';
}

async function toggleAdmin(userId, isAdmin) {
  try {
    await api(`/admin/users/${userId}/set-admin?is_admin=${isAdmin}`, 'POST');
    await loadAdminUsers();
    showToast(isAdmin ? '已设为管理员' : '已取消管理员');
  } catch(e) { showToast(e.message, 'error'); loadAdminUsers(); }
}

async function deleteUser(userId) {
  if (!confirm('确认删除该用户？该用户所有钓鱼记录也会被删除！')) return;
  try {
    await api(`/admin/users/${userId}`, 'DELETE');
    await loadAdminUsers();
    showToast('用户已删除');
  } catch(e) { showToast(e.message, 'error'); }
}

document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
addCatch();
checkAuth();
</script>
